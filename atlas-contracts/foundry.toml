[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"
fs_permissions = [{access = "read-write", path = "./"}]
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@uniswap/v4-core/=lib/v4-core/",
    "@uniswap/v4-periphery/=lib/v4-periphery/",
    "v4-core/=lib/v4-core/src/",
    "v4-periphery/=lib/v4-periphery/src/",
    "uniswap-hooks/=lib/uniswap-hooks/src/",
    "solmate/=lib/v4-core/lib/solmate/src/",
    "permit2/=lib/v4-periphery/lib/permit2/src/"
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"

[rpc_endpoints]
unichain_sepolia = "${UNICHAIN_SEPOLIA_RPC}"
sepolia = "${SEPOLIA_RPC}"
reactive_testnet = "${REACTIVE_TESTNET_RPC}"

[etherscan]
unichain_sepolia = {key = "${UNICHAIN_EXPLORER_API_KEY}", url = "https://unichain-sepolia.blockscout.com/api"}
